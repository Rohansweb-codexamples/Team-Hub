<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Hub</title>

<style>
/* --- CSS (same styling, simplified for single file) --- */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}
header {
  background: #1e293b;
  padding: 1rem;
  text-align: center;
  font-size: 1.4rem;
  font-weight: bold;
  color: #38bdf8;
}
section {
  margin: 1rem auto;
  max-width: 900px;
  background: #1e293b;
  padding: 1rem;
  border-radius: 10px;
}
h2 {
  margin-top: 0;
  color: #38bdf8;
}
.team-member, .repo-item, .post {
  background: #0f172a;
  padding: 0.8rem;
  border-radius: 8px;
  margin-bottom: 0.6rem;
  border: 1px solid #334155;
}
.post-form input, .post-form textarea {
  width: 100%;
  padding: 0.5rem;
  margin-bottom: 0.6rem;
  border-radius: 6px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
}
button {
  padding: 0.5rem 1rem;
  background: #38bdf8;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}
button:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<header>Team Hub</header>

<section>
  <h2>Team Members</h2>
  <div id="team"></div>
</section>

<section>
  <h2>GitHub Repositories</h2>
  <div id="repos"></div>
</section>

<section>
  <h2>Team Posts</h2>

  <form id="post-form" class="post-form">
    <input id="author" type="text" placeholder="Your name" required />
    <textarea id="message" rows="3" placeholder="Write a message..." required></textarea>
    <button type="submit">Post</button>
    <p id="status"></p>
  </form>

  <div id="posts"></div>
</section>

<script>
// ------------------------------
// CONFIG
// ------------------------------
const API = "https://team-hub-l8r0.onrender.com";

// ------------------------------
// TEAM DATA
// ------------------------------
const teamMembers = [
  { name: "Alice Johnson", role: "Frontend Engineer", github: "alice-dev" },
  { name: "Ben Carter", role: "Backend Engineer", github: "bencarter" },
  { name: "Chloe Smith", role: "DevOps", github: "chloe-ops" },
  { name: "David Lee", role: "Full Stack", github: "dlee-stack" }
];

// ------------------------------
// REPO DATA
// ------------------------------
const repos = [
  { name: "team-hub", url: "https://github.com/your-org/team-hub" },
  { name: "api-service", url: "https://github.com/your-org/api-service" },
  { name: "frontend-app", url: "https://github.com/your-org/frontend-app" }
];

// ------------------------------
// RENDER TEAM
// ------------------------------
function renderTeam() {
  const box = document.getElementById("team");
  teamMembers.forEach(m => {
    box.innerHTML += `
      <div class="team-member">
        <strong>${m.name}</strong><br>
        ${m.role}<br>
        <a href="https://github.com/${m.github}" target="_blank">@${m.github}</a>
      </div>
    `;
  });
}

// ------------------------------
// RENDER REPOS
// ------------------------------
function renderRepos() {
  const box = document.getElementById("repos");
  repos.forEach(r => {
    box.innerHTML += `
      <div class="repo-item">
        <strong>${r.name}</strong><br>
        <a href="${r.url}" target="_blank">View on GitHub</a>
      </div>
    `;
  });
}

// ------------------------------
// POSTS
// ------------------------------
async function loadPosts() {
  const res = await fetch(`${API}/api/posts`);
  const data = await res.json();

  const box = document.getElementById("posts");
  box.innerHTML = "";

  data.forEach(p => {
    box.innerHTML += `
      <div class="post">
        <strong>${p.author}</strong> — ${new Date(p.createdAt).toLocaleString()}<br>
        ${p.message}
      </div>
    `;
  });
}

document.getElementById("post-form").addEventListener("submit", async e => {
  e.preventDefault();

  const author = document.getElementById("author").value.trim();
  const message = document.getElementById("message").value.trim();
  const status = document.getElementById("status");

  status.textContent = "Posting...";

  await fetch(`${API}/api/posts`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ author, message })
  });

  status.textContent = "Posted!";
  document.getElementById("post-form").reset();
  loadPosts();
});

// ------------------------------
// INIT
// ------------------------------
renderTeam();
renderRepos();
loadPosts();
</script>

</body>
</html>
